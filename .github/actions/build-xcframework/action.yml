name: Build XCFramework
description: Sets up Xcode, caches the iOS Simulator runtime, and builds BandwidthRTC.xcframework.

inputs:
  marketing_version:
    description: The version string to embed in the framework (e.g. "1.2.3" or "build-123")
    required: true
  run_tests:
    description: Whether to run unit tests before building
    required: false
    default: 'false'

outputs:
  zip_path:
    description: Relative path to the zipped XCFramework
    value: ${{ steps.build.outputs.zip_path }}

runs:
  using: composite
  steps:
    - name: Select Xcode version
      id: xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Download iOS Simulator runtime
      shell: bash
      run: xcodebuild -downloadPlatform iOS

    - name: Run unit tests
      if: inputs.run_tests == 'true'
      shell: bash
      run: |
        xcodebuild test \
          -scheme BandwidthRTC \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -enableCodeCoverage YES

    - name: Build XCFramework
      id: build
      shell: bash
      env:
        MARKETING_VERSION: ${{ inputs.marketing_version }}
      run: |
        # Archive for iOS device
        xcodebuild archive \
          -scheme BandwidthRTC \
          -destination "generic/platform=iOS" \
          -archivePath build/ios.xcarchive \
          SKIP_INSTALL=NO \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
          INSTALL_PATH='/Library/Frameworks' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          MARKETING_VERSION="${MARKETING_VERSION}" \
          OTHER_SWIFT_FLAGS="-Xfrontend -no-verify-emitted-module-interface"

        # Archive for iOS Simulator
        xcodebuild archive \
          -scheme BandwidthRTC \
          -destination "generic/platform=iOS Simulator" \
          -archivePath build/ios-sim.xcarchive \
          SKIP_INSTALL=NO \
          BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
          INSTALL_PATH='/Library/Frameworks' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          MARKETING_VERSION="${MARKETING_VERSION}" \
          OTHER_SWIFT_FLAGS="-Xfrontend -no-verify-emitted-module-interface"

        # Locate the framework bundles (path varies by machine/Swift Package layout)
        IOS_FRAMEWORK=$(find build/ios.xcarchive -name "BandwidthRTC.framework" -type d | head -n 1)
        IOS_SIM_FRAMEWORK=$(find build/ios-sim.xcarchive -name "BandwidthRTC.framework" -type d | head -n 1)

        if [ -z "$IOS_FRAMEWORK" ] || [ -z "$IOS_SIM_FRAMEWORK" ]; then
          echo "Error: could not locate BandwidthRTC.framework in xcarchive" >&2
          find build/ -name "*.framework" -type d >&2
          exit 1
        fi

        echo "iOS framework:     $IOS_FRAMEWORK"
        echo "Simulator framework: $IOS_SIM_FRAMEWORK"

        # Combine into XCFramework
        xcodebuild -create-xcframework \
          -framework "$IOS_FRAMEWORK" \
          -framework "$IOS_SIM_FRAMEWORK" \
          -output BandwidthRTC.xcframework

        # Zip for distribution
        zip -r BandwidthRTC.xcframework.zip BandwidthRTC.xcframework
        echo "zip_path=BandwidthRTC.xcframework.zip" >> "$GITHUB_OUTPUT"
