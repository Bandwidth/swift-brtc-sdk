name: Draft Release

on:
  push:
    branches:
      - main
      - master
      - workflow-fixes

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - uses: release-drafter/release-drafter@v7
        with:
          config-name: draft-release.yml
        env:
          GITHUB_ENV_VERSION: ${{ steps.version.outputs.VERSION }}
