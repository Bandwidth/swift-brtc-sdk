name: Draft Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        run: |
          set -x
          VERSION="v${{ steps.version.outputs.VERSION }}"

          echo "::notice::VERSION=$VERSION"
          echo "::notice::REPO=${{ github.repository }}"
          echo "::notice::SHA=${{ github.sha }}"

          echo "--- gh auth status ---"
          gh auth status

          echo "--- Checking for existing release ---"
          RELEASE_EXISTS=$(gh release view "$VERSION" --repo "${{ github.repository }}" --json isDraft -q '.isDraft' 2>&1) || true
          echo "::notice::RELEASE_EXISTS='$RELEASE_EXISTS'"

          echo "--- Listing existing releases ---"
          gh release list --repo "${{ github.repository }}" --limit 5 || true

          if [ "$RELEASE_EXISTS" = "true" ]; then
            echo "::notice::Draft release exists, editing..."
            gh release edit "$VERSION" \
              --generate-notes \
              --repo "${{ github.repository }}"
          elif [ "$RELEASE_EXISTS" = "false" ]; then
            echo "::error::Release $VERSION already exists and is published. Cannot create a new draft. Bump the version in the VERSION file to create a new release."
            exit 1
          else
            echo "::notice::Release does not exist, creating draft..."
            gh release create "$VERSION" \
              --draft \
              --title "$VERSION" \
              --generate-notes \
              --repo "${{ github.repository }}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
