name: Build Library

on: push

permissions:
  id-token: write
  contents: write

jobs:
  build-xcframework:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download iOS Simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Extract version from tag
        id: version
        run: echo "VERSION=build-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme BandwidthRTC \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -enableCodeCoverage YES

      - name: Build XCFramework
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Archive for iOS device
          xcodebuild archive \
            -scheme BandwidthRTC \
            -destination "generic/platform=iOS" \
            -archivePath build/ios.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            INSTALL_PATH='/Library/Frameworks' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${MARKETING_VERSION}" \
            OTHER_SWIFT_FLAGS="-Xfrontend -no-verify-emitted-module-interface"

          # Archive for iOS Simulator
          xcodebuild archive \
            -scheme BandwidthRTC \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/ios-sim.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            INSTALL_PATH='/Library/Frameworks' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${MARKETING_VERSION}" \
            OTHER_SWIFT_FLAGS="-Xfrontend -no-verify-emitted-module-interface"

          # Combine into XCFramework
          xcodebuild -create-xcframework \
            -framework build/ios.xcarchive/Products/Library/Frameworks/BandwidthRTC.framework \
            -framework build/ios-sim.xcarchive/Products/Library/Frameworks/BandwidthRTC.framework \
            -output BandwidthRTC.xcframework

          # Zip for upload
          zip -r BandwidthRTC.xcframework.zip BandwidthRTC.xcframework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-${{ steps.version.outputs.VERSION }}
          path: BandwidthRTC.xcframework.zip
          retention-days: 3
