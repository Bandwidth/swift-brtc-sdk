name: Build Library

on: push

permissions:
  id-token: write
  contents: write

jobs:
  build-xcframework:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version is bumped
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          git fetch origin main --depth=1 2>/dev/null || git fetch origin master --depth=1 2>/dev/null || true
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null || git show origin/master:VERSION 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(cat VERSION)

          # Compare using sort -V: if sorting puts current last it's higher; equal means not bumped
          HIGHER=$(printf '%s\n' "$MAIN_VERSION" "$CURRENT_VERSION" | sort -V | tail -n1)
          if [ "$CURRENT_VERSION" = "$MAIN_VERSION" ] || [ "$HIGHER" != "$CURRENT_VERSION" ]; then
            MAJOR=$(echo "$MAIN_VERSION" | cut -d. -f1)
            MINOR=$(echo "$MAIN_VERSION" | cut -d. -f2)
            PATCH=$(echo "$MAIN_VERSION" | cut -d. -f3)
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "::error::VERSION must be bumped before merging. Current on main: $MAIN_VERSION. Update VERSION to at least $NEXT."
            exit 1
          fi

      - name: Extract version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        id: build
        uses: ./.github/actions/build-xcframework
        with:
          marketing_version: ${{ steps.version.outputs.VERSION }}
          run_tests: "true"

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-${{ steps.version.outputs.VERSION }}
          path: ${{ steps.build.outputs.zip_path }}
          retention-days: 3
