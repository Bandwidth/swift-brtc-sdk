name: Publish Release

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: write

jobs:
  build-xcframework:
    # Only run for production (non-pre-release) releases
    if: ${{ !github.event.release.prerelease }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # Strip a leading "v" if present (v1.2.3 → 1.2.3)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Archive for iOS device
          xcodebuild archive \
            -scheme BandwidthRTC \
            -destination "generic/platform=iOS" \
            -archivePath build/ios.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            INSTALL_PATH='/Library/Frameworks' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${VERSION}" \
            OTHER_SWIFT_FLAGS="-Xfrontend -no-verify-emitted-module-interface"

          # Archive for iOS Simulator
          xcodebuild archive \
            -scheme BandwidthRTC \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/ios-sim.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            INSTALL_PATH='/Library/Frameworks' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${VERSION}" \
            OTHER_SWIFT_FLAGS="-Xfrontend -no-verify-emitted-module-interface"

          # Combine into XCFramework
          xcodebuild -create-xcframework \
            -framework build/ios.xcarchive/Products/Library/Frameworks/BandwidthRTC.framework \
            -framework build/ios-sim.xcarchive/Products/Library/Frameworks/BandwidthRTC.framework \
            -output BandwidthRTC.xcframework

          # Zip for upload
          zip -r BandwidthRTC.xcframework.zip BandwidthRTC.xcframework

      - name: Upload XCFramework to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" BandwidthRTC.xcframework.zip \
            --clobber \
            --repo "${{ github.repository }}"
